<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>To-do App</title>
    </head>
    <body>
        <div class="container">
            <h1>To-do App</h1>
            <div class="input_area">
                <input id="task_input" type="text" placeholder="Add a new task">
                <button id="add_btn">+</button>
            </div>
            <div class="content_area">
                <div class="filter_area">
                    <button id="all_btn" class="filter_btn">All</button>
                    <button id="active_btn" class="filter_btn">Active</button>
                    <button id="completed_btn" class="filter_btn">Completed</button>
                    <button id="clear_btn">Clear Completed</button>
                </div>
                <ul>
                </ul>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
